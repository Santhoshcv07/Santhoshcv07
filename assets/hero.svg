
<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1117">
        <animate attributeName="stop-color"
          values="#0D1117;#101826;#0D1117"
          dur="8s"
          repeatCount="indefinite"/>
      </stop>

      <stop offset="100%" stop-color="#161B22">
        <animate attributeName="stop-color"
          values="#161B22;#1E293B;#161B22"
          dur="8s"
          repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <radialGradient id="glow">
      <stop offset="0%" stop-color="#58A6FF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#58A6FF" stop-opacity="0"/>
    </radialGradient>

  </defs>

  <rect width="1200" height="320" rx="28" fill="url(#bg)"/>

  <circle cx="930" cy="90" r="180" fill="url(#glow)">
      <animateTransform
          attributeName="transform"
          type="translate"
          values="0 0;-30 20;0 0"
          dur="10s"
          repeatCount="indefinite"/>
  </circle>

  <circle cx="250" cy="260" r="120" fill="url(#glow)" opacity=".35">
      <animateTransform
          attributeName="transform"
          type="translate"
          values="0 0;20 -15;0 0"
          dur="9s"
          repeatCount="indefinite"/>
  </circle>

  <text
      x="70"
      y="110"
      font-size="48"
      font-family="Segoe UI"
      fill="#F0F6FC"
      font-weight="700">
      Santhosh C V
  </text>

  <text
      x="70"
      y="155"
      font-size="22"
      font-family="Segoe UI"
      fill="#58A6FF">
      Full-Stack Developer
  </text>

  <text
      x="70"
      y="195"
      font-size="18"
      font-family="Segoe UI"
      fill="#8B949E">
      Building AI-Powered Web Applications
  </text>

</svg>
